<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberTutor IA</title>

  <!-- Fuentes del sistema de diseño unificado -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="navbar">
  <h2>CyberTutor IA</h2>
  <nav>
    <a href="/">Inicio</a>
    <a href="/simulation">Simulación</a>
    <a href="/quiz">Quiz</a>
    <a href="/chat">Chat IA</a>
    <a href="/auth/logout" style="color: var(--danger); margin-left: 8px;">Salir</a>
  </nav>
</header>

<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<style>
  /* Flash messages */
  .flash {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 14px;
    border: 1px solid;
  }
  .flash-error   { background: rgba(255,69,96,0.1);  color: #ff8899; border-color: rgba(255,69,96,0.25); }
  .flash-success { background: rgba(0,224,150,0.1);  color: #88ffcc; border-color: rgba(0,224,150,0.25); }
  .flash-info    { background: rgba(79,110,247,0.1); color: #aabeff; border-color: rgba(79,110,247,0.25); }
</style>

</body>
</html>
